<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bookmarks+ Settings</title>
  <link rel="stylesheet" href="../tokens.css" />
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>Bookmarks+</h1>
      <div class="header-meta">
        <span id="version" class="version"></span>
        <img src="../icons/icon48.png" alt="Bookmarks+ logo" class="header-logo" />
      </div>
    </div>

    <div class="tab-row">
      <nav id="tab-bar" class="tab-bar"></nav>
      <div class="tab-actions">
        <div id="status"></div>
        <button id="save">Save settings</button>
      </div>
    </div>
    <div id="tab-panels"></div>
  </div>
  <script src="../options.js"></script>
</body>
</html>
